# Theme Configuration for Modern Academic Look
# This file goes in: config/_default/params.yaml

# Appearance settings
appearance:
  theme_day: custom  # Use custom theme
  theme_night: custom
  font: custom
  font_size: L

# Font configuration
font_family:
  # Headings
  heading_font: "Merriweather"
  # Body text
  body_font: "Inter"
  # Navigation
  nav_font: "Inter"
  # Monospace (for code)
  mono_font: "JetBrains Mono"

# Google Fonts
google_fonts: "Merriweather:400,700|Inter:400,500,600,700"

# Site header
header:
  navbar:
    enable: true
    align: r  # Right align navigation
    show_logo: true
    show_language: false
    show_day_night: false
    show_search: true
    highlight_active_link: true

# Contact links (keep your existing ones, just reformatted)
contact_links:
  - icon: twitter
    icon_pack: fab
    name: DM Me
    link: 'https://twitter.com/camilonim'  # Update with your Twitter
  - icon: envelope
    icon_pack: fas
    name: Email
    link: 'mailto:camilo.nieto-matiz@utsa.edu'  # Update with your email

# Icon pack for social links
icon:
  pack:
    ai: true
    fas: true
    fab: true

# Show related content
show_related: true

# Reading time
reading_time: false  # Turn off for publications

# Section pager (navigation between sections)
section_pager: false

# Sharing options
sharing: true

# Copyright
copyright:
  license:
    enable: false

# Comments
comments:
  provider: ''

# Privacy
privacy_pack: false

# Site features
features:
  syntax_highlighter:
    enable: false
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/camilonietoma/camilonietom'
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle  # circle or square

# Marketing (turn these off)
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'University of Texas at San Antonio'
    description: 'Political scientist studying violence, state building, and transitional justice in Latin America'
    twitter: 'camilonim'  # Update this
  analytics:
    google_analytics: ''
    baidu_tongji: ''
  verification:
    google: ''
    baidu: ''

# Map provider (if you want a map on contact page)
map:
  provider: 'mapnik'
  api_key: ''
  zoom: 15
